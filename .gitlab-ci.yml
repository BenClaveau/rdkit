# Build the Spaya RDKit MinimalLib WASM and publish it to the GitLab npm Package
# Registry as @spaya/rdkit. Runs on git tags (e.g. v2024.3.1).
#
# Publish uses the project npm endpoint + CI_JOB_TOKEN. (Consumers install via the
# instance-wide endpoint, which requires the @spaya scope to match the root group.)
#
# Base images come from AWS Public ECR (Docker Hub mirror, no rate limits). We
# assume an AWS role via GitLab OIDC and log in to Public ECR (authenticated pulls
# = higher rate limit) before building. ROLE_ARN is a CI/CD variable.
#
# aws is run from the official aws-cli container (via the dind daemon), NOT from
# Alpine's `aws-cli` package: that package is broken in the docker:27 image
# (pyexpat "XML_SetAllocTrackerActivationThreshold: symbol not found").

stages:
  - publish

# dind runner selector: the `docker-in-docker` tag is required for the job to be
# scheduled on a privileged runner (shared .docker-in-docker template convention).
.docker-in-docker:
  tags:
    - docker-in-docker
  image: public.ecr.aws/docker/library/docker:27
  services:
    - name: public.ecr.aws/docker/library/docker:27-dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_BUILDKIT: "1"
    # Tell the docker client how to reach the dind service (alias `docker`).
    # TLS is disabled (plain tcp/2375) — simplest reliable config on the
    # Kubernetes executor; dind listens on 2375 when the cert dir is empty.
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""

publish-wasm:
  stage: publish
  extends: .docker-in-docker
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.dc.corp.iktos.ai
  variables:
    AWS_CLI_IMAGE: public.ecr.aws/aws-cli/aws-cli:latest
  rules:
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apk add --no-cache nodejs npm
    # Wait for the dind daemon (bounded: fail fast instead of hanging 1h if the
    # docker client can't reach the service), then pre-pull the aws-cli image so
    # `aws` runs in its own container (Alpine's aws-cli package is broken).
    - |
      for i in $(seq 1 30); do
        docker info >/dev/null 2>&1 && break
        echo "waiting for dind ($i/30)…"; sleep 2
      done
      docker info >/dev/null 2>&1 || { echo "dind not reachable at $DOCKER_HOST"; exit 1; }
    - docker pull "$AWS_CLI_IMAGE"
    # Helper: run the AWS CLI in the official container, forwarding the OIDC token.
    - |
      aws() {
        docker run --rm \
          -e GITLAB_OIDC_TOKEN \
          "$AWS_CLI_IMAGE" "$@"
      }
    # Assume the AWS role via GitLab OIDC, then log in to Public ECR.
    - |
      export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s" \
        $(aws sts assume-role-with-web-identity \
          --role-arn "${ROLE_ARN}" \
          --role-session-name "GitLabRunner-${CI_PROJECT_ID}-${CI_PIPELINE_ID}" \
          --web-identity-token "${GITLAB_OIDC_TOKEN}" \
          --duration-seconds 3600 \
          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
          --output text))
    # Log in to Public ECR: get the password in the aws container, pipe to the
    # host docker login (region is always us-east-1 for ECR Public).
    - |
      docker run --rm \
        -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_SESSION_TOKEN \
        "$AWS_CLI_IMAGE" ecr-public get-login-password --region us-east-1 \
        | docker login --username AWS --password-stdin public.ecr.aws
  script:
    # Build the WASM straight into the npm package dir. `--target export-stage`
    # (a scratch stage) drops exactly RDKit_minimal.{js,wasm} at the output root.
    - docker build -f Code/MinimalLib/docker/Dockerfile_local --target export-stage -o Code/MinimalLib/npm .
    - cd Code/MinimalLib/npm
    - npm version --no-git-tag-version --allow-same-version "${CI_COMMIT_TAG#v}"
    - |
      cat > .npmrc <<EOF
      @spaya:registry=https://gitlab.dc.corp.iktos.ai/api/v4/projects/${CI_PROJECT_ID}/packages/npm/
      //gitlab.dc.corp.iktos.ai/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}
      EOF
    - npm publish
