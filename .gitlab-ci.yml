# Build the Spaya RDKit MinimalLib WASM and publish it to the GitLab npm Package
# Registry as @spaya/rdkit. Runs on git tags (e.g. v2024.3.1).
#
# Publish uses the project npm endpoint + CI_JOB_TOKEN. (Consumers install via the
# instance-wide endpoint, which requires the @spaya scope to match the root group.)
#
# Base images come from AWS Public ECR (Docker Hub mirror, no rate limits), pulled
# anonymously — the Kubernetes runner pulls docker/dind fine without AWS creds. If
# throttling ever appears, add a small dedicated OIDC role scoped to spaya/rdkit
# and log in to Public ECR before building.

stages:
  - publish

# dind runner selector: the `docker-in-docker` tag is required for the job to be
# scheduled on a privileged runner (shared .docker-in-docker template convention).
.docker-in-docker:
  tags:
    - docker-in-docker
  image: public.ecr.aws/docker/library/docker:27
  services:
    - name: public.ecr.aws/docker/library/docker:27-dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_BUILDKIT: "1"
    # Tell the docker client how to reach the dind service (alias `docker`).
    # TLS is disabled (plain tcp/2375) — simplest reliable config on the
    # Kubernetes executor; dind listens on 2375 when the cert dir is empty.
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""

publish-wasm:
  stage: publish
  extends: .docker-in-docker
  rules:
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apk add --no-cache nodejs npm
    # Wait for the dind daemon (bounded: fail fast instead of hanging 1h if the
    # docker client can't reach the service).
    - |
      for i in $(seq 1 30); do
        docker info >/dev/null 2>&1 && break
        echo "waiting for dind ($i/30)…"; sleep 2
      done
      docker info >/dev/null 2>&1 || { echo "dind not reachable at $DOCKER_HOST"; exit 1; }
  script:
    # Build the WASM straight into the npm package dir. `--target export-stage`
    # (a scratch stage) drops exactly RDKit_minimal.{js,wasm} at the output root.
    - docker build -f Code/MinimalLib/docker/Dockerfile_local --target export-stage -o Code/MinimalLib/npm .
    - cd Code/MinimalLib/npm
    - npm version --no-git-tag-version --allow-same-version "${CI_COMMIT_TAG#v}"
    - |
      cat > .npmrc <<EOF
      @spaya:registry=https://gitlab.dc.corp.iktos.ai/api/v4/projects/${CI_PROJECT_ID}/packages/npm/
      //gitlab.dc.corp.iktos.ai/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}
      EOF
    - npm publish
